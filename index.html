<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-app">
        <div class="container">
            <h3 class="brand">The Weather</h3>
            <div>
                <h1 class="temp">16&#176;</h1>
                <div class="city-time">
                    <h1 class="name">Kolkata</h1>
                    <small>
                        <span class="time">06:09</span>
                        -
                        <span class="date">Monday Sep 19</span>
                    </small>
                </div>
                <div class="weather">
                    <img src="./icons/day/113.png" alt="icon" class="icon" width="50" height="50">
                    <span class="condition">Cloudy</span>
                </div>
            </div>
        </div>
        <div class="panel">
            <form action="" id="locationInput">
                <input type="text" class="search" placeholder="Search Location...">
                <button type="submit" class="submit"><span class="material-symbols-outlined">search</span></button>
            </form>

            <ul class="cities">
                <li class="city">Kolkata</li>
                <li class="city">New Delhi</li>
                <li class="city">Mumbai</li>
            </ul>

            <ul class="details">
                <h4>Weather Details</h4>
                <li><span>Cloudy</span><span class="cloud">89%</span></li>
                <li><span>Humidity</span><span class="humidity">64%</span></li>
                <li><span>Wind</span><span class="wind">8km/h</span></li>
            </ul>
        </div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
